<div class="main-container">
    <div class="top-link">DALL.com</div>

    <div class="login-card">
        <div class="image-section">
            <img src="assets/images/logo.png" alt="Login Banner">
        </div>

        <div class="form-section">
            <h2>Welcome Back!</h2>
            <p class="subtitle">Enter Your Details Below</p>

            <form (ngSubmit)="onLogin()">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <p *ngIf="errorMessage" class="error-msg" style="color: #ff4d4d; font-size: 12px; margin-bottom: 15px;">
                    {{ errorMessage }}
                </p>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" [disabled]="isLoading">
                    {{ isLoading ? 'Processing...' : 'Log in' }}
                </button>
            </form>

            <p class="signup-text">Don't have an account? <a routerLink="/signup">Sign Up</a></p>
        </div>
    </div>
</div>
