<div class="map-container" [class.fullscreen]="isFullscreen" (click)="onMapClick($event)">

  <img #mapImage [src]="imageUrl || 'assets/images/mapview1.jpg'" class="map-image" (load)="onImageLoad()">

  <!-- Saved Anchors -->
  <div *ngFor="let anchor of anchors" class="map-anchor" [style.left.px]="imageOffsetX + (anchor.pixels?.x || 0)"
    [style.top.px]="imageOffsetY + (anchor.pixels?.y || 0)" (click)="onAnchorClick($event, anchor)">

    <img src="assets/icons/service-anchor.png" [alt]="anchor.name" [title]="anchor.name">

    <span>{{ anchor.name }}</span>
  </div>

  <!-- Preview Anchor -->
  <div *ngIf="previewPos" class="map-anchor preview" [style.left.px]="imageOffsetX + (previewPos.pixelX || 0)"
    [style.top.px]="imageOffsetY + (previewPos.pixelY || 0)">

    <img src="assets/icons/service-anchor.png" alt="New anchor">
  </div>

</div>

<!-- 💾 زر الحفظ (مهم جداً عشان ما نحرق Firestore) -->
<div class="map-actions">
  <button (click)="saveGeneratedNeighborsToFirestore()">
    💾 Save Neighbors
  </button>
</div>
