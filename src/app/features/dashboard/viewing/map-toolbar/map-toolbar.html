<div class="hero-card">
  <div class="hero-content">
    <h1>Find Your Way Smarter</h1>
  </div>

  <img src="assets/images/logo4.png" class="hero-logo2">
</div>

<div class="toolbar-main-container">
  <div class="toolbar-inner-content">

    <div class="main-actions-group glass-panel">

      <button class="modern-btn" (click)="fileInput.click()">
        <span class="plus-sign">＋</span> Add Map
      </button>

      <input #fileInput type="file" (change)="onFileSelected($event)" hidden accept="image/*">

      <div class="modern-selector-box">
        <label>Map Section</label>
        <div class="dropdown-wrapper">
          <select (change)="onMapChange($event)">
            <option *ngFor="let map of maps" [value]="map.id">
              {{ map.name }}
            </option>
          </select>
        </div>
      </div>

      <button *ngIf="currentMapId" class="modern-btn delete-variant" (click)="onDeleteMap()">
        🗑️ Delete
      </button>

    </div>

  </div>
</div>
