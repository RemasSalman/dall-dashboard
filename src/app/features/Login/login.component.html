<div class="login-page">
  <div class="login-card">
    <h1>DALL</h1>
    <h2>Admin Login</h2>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Email"
    />

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Password"
    />

    <button (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>

    <p class="hint">Credentials are provided by DALL.</p>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</div>
